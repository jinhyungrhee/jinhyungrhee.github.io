    "js-input": {
        "title": "JavaScript (6) - 사용자 입력",
            "author": "jinhyungrhee",
            "category": "",
            "content": "사용자 입력(Input)  사용자로부터 데이터를 전달 받아 화면에 표시index.html&lt;body&gt;    &lt;div id=\"login-form\"&gt;        &lt;input type=\"text\" placeholder=\"what is your name?\"/&gt;        &lt;button&gt;Log In&lt;/button&gt;    &lt;/div&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;app.jsconst loginInput = document.querySelector(\"#login-form input\");const loginButton = document.querySelector(\"#login-form button\");  JavaScript에서 input과 button 객체로 가져오기app.jsconst loginInput = document.querySelector(\"#login-form input\");const loginButton = document.querySelector(\"#login-form button\");function handleLoginBtnClick() {    console.log(loginInput.value);    console.log(\"click!!\");}loginButton.addEventListener(\"click\", handleLoginBtnClick);  input에 입력한 값(value) 콘솔에 찍어보기  username 유효성 검사1.JavaScript만 사용app.jsfunction handleLoginBtnClick() {    const username = loginInput.value;    if(username === \"\") {        alert(\"Please write your name\");    } else if(username.length &gt; 15) {// 15자 넘으면 경고        alert(\"Your name is too long.\");    }}2.HTML 활용하기  HTML input 태그 자체적으로 제공하는 기능 有          required : 필수 입력 지정      maxlength : 최대 글자수 지정      index.html&lt;body&gt;    &lt;form id=\"login-form\"&gt;        &lt;input        required        maxlength=\"15\"         type=\"text\"        placeholder=\"what is your name?\"/&gt;        &lt;!-- &lt;input type=\"submit\" value=\"Log In\"&gt; --&gt;        &lt;button&gt;Log In&lt;/button&gt;    &lt;/form&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;      HTML로 input의 유효성 검사를 작동시키기 위해서는 form 태그 안에 있어야 함!        HTML을 이용한 유효성 검사는 form이 submit되어 웹사이트를 재시작시킴!          input 안에 있는 button을 누르면 form submit      type이 submit인 input을 클릭하면 form submit      ➡ 이러한 HTML input의 기능을 이용하면 더 이상 click을 신경쓸 필요 없이 form을 submit하는 것에 관심을 둘 수 있음  form submit시 새로고침 되는 것 막기  새로고침은 form submit의 기본 동작임  onLoginSubmit 함수가 하나의 argument(event)를 받도록 하고 그것은 JS에게 넘겨주어서 처리함          .preventDefault() 사용 : 어떤 event의 기본 행동(ex새로고침)도 발생하지 못하도록 막음      app.jsconst loginForm = document.querySelector(\"#login-form\");const loginInput = document.querySelector(\"#login-form input\");function onLoginSubmit(event) {    event.preventDefault();    console.log(loginInput.value);}loginForm.addEventListener(\"submit\", onLoginSubmit);// function() =&gt; 브라우저가 ()를 보는 순간 바로 실행// function 자체를 인자로 주면 =&gt; event가 발생했을 때만 실행(브라우저가 봐도 실행x)  즉 브라우저가 함수를 호출시켜 줄 뿐만 아니라 event에 관한 정보도 담아주는 것!  a태그에서 링크로 이동하는 것 막기index.html&lt;body&gt;    &lt;form id=\"login-form\"&gt;        &lt;input        required        maxlength=\"15\"         type=\"text\"        placeholder=\"what is your name?\"/&gt;        &lt;button&gt;Log In&lt;/button&gt;    &lt;/form&gt;    &lt;a href=\"https://nomadcoders.co\"&gt;Go to courses&lt;/a&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;app.jsconst link = document.querySelector(\"a\");function handleLinkClick (event) {    event.preventDefault();    console.dir(event);}link.addEventListener(\"click\", handleLinkClick);  username 제출하면 form 사리지게 하기style.css.hidden {    display: none;}app.jsconst loginForm = document.querySelector(\"#login-form\");const loginInput = document.querySelector(\"#login-form input\");function onLoginSubmit(event) {    event.preventDefault(); // 새로고침(기본동작) 막아줌    const username = loginInput.value;    loginForm.classList.add(\"hidden\");    console.log(username);}loginForm.addEventListener(\"submit\", onLoginSubmit);  css를 이용하여 숨김  username 입력하면 form은 사라지고 h1에 이름 추가하기app.jsconst loginForm = document.querySelector(\"#login-form\");const loginInput = document.querySelector(\"#login-form input\");const greeting = document.querySelector(\"#greeting\"); const HIDDEN_CLASSNAME = \"hidden\"; // 일반적으로 string만 포함된 변수는 대문자로 표기function onLoginSubmit(event) {    event.preventDefault(); // 새로고침(기본동작) 막아줌    loginForm.classList.add(HIDDEN_CLASSNAME);    const username = loginInput.value;    //greeting.innerText = \"Hello \" + username;    greeting.innerText = `Hello ${username}`; // backtick사용    greeting.classList.remove(HIDDEN_CLASSNAME);}loginForm.addEventListener(\"submit\", onLoginSubmit);      innerText와 classList.add/remove 사용        string과 변수를 합치는 방법 (변수를 string안에 포함시키는 방법)          “string “(‘string ‘) + 변수      `string ${변수}` ➡ backtick(`)사용        local storage API  작은 DB같은 API          브라우저에 일단 저장하고 나중에 가져다가 사용하는 것이 가능        method          setItem() : local storage에 정보 저장      getItem() : local storage에 저장된 정보 가져옴      removeItem() : local storage에 저장된 정보 삭제        username 저장 여부에 따라 form 표시하기  local storage가 비어 있으면 form 보여주지만 local storage에 유저정보가 있으면 form을 숨기고 h1을 보여주는 기능 구현  local storage가 비어 있으면 .getItem(\"username\")입력 시 null 리턴 ➡ if문 처리index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Momentum App&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;form id=\"login-form\" class=\"hidden\"&gt;        &lt;input        required        maxlength=\"15\"         type=\"text\"        placeholder=\"what is your name?\"/&gt;        &lt;button&gt;Log In&lt;/button&gt;    &lt;/form&gt;    &lt;h1 id=\"greeting\" class=\"hidden\"&gt;&lt;/h1&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;  form과 h1 모두 처음에는 안 보이도록 .hidden 적용app.jsconst loginForm = document.querySelector(\"#login-form\");const loginInput = document.querySelector(\"#login-form input\");const greeting = document.querySelector(\"#greeting\"); const HIDDEN_CLASSNAME = \"hidden\"; // 일반적으로 string만 포함된 변수는 대문자로 표기const USERNAME_KEY = \"username\"; // string을 중복해서 사용하는 경우에 대문자 변수로 대체해서 사용(오타 확인)function onLoginSubmit(event) {    event.preventDefault(); // 새로고침(기본동작) 막아줌    loginForm.classList.add(HIDDEN_CLASSNAME);    const username = loginInput.value;    localStorage.setItem(USERNAME_KEY, username);    paintGreetings(username);}// 반복적으로 사용되는 코드는 함수로 만들어서 사용function paintGreetings(username) {     greeting.innerText = `Hello ${username}`;    greeting.classList.remove(HIDDEN_CLASSNAME); }const savedUsername = localStorage.getItem(USERNAME_KEY);if (savedUsername === null) {    loginForm.classList.remove(HIDDEN_CLASSNAME);    loginForm.addEventListener(\"submit\", onLoginSubmit);} else {    paintGreetings(savedUsername);}  if문으로 username 저장 여부 확인한 뒤 form을 보여주고 submit event 발생하기를 기다렸다가  event가 발생하면 handler함수로 처리함  handler함수가 실행되면 username은 local storage에 저장되고 form은 숨겨지며 h1에 텍스트 username이 입력되어 화면에 나타나게 됨JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",
        "url": "/js-input"
    }

    "js-css": {
        "title": "JavaScript (5) - CSS 작업",
            "author": "jinhyungrhee",
            "category": "",
            "content": "JavaScript를 이용한 CSS 작업  JavaScript 코드 안에서 직접 CSS를 적용하는 것은 바람직하지 않음  CSS 작업은 CSS 파일 안에서!style.cssbody {    background-color: beige;}h1 {    color: blue;}.active {    color: tomato;}  h1이든, span이든 어떤 element든지 active를 클래스명으로 적용하면 tomato 색깔을 가지게 됨!app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    h1.className = \"active\"; // 현재 이 코드는 getter이면서 setter임!}h1.addEventListener(\"click\", handleTitleClick);  JavaScript가 CSS를 직접 건드리지 않고 html만을 변경함          이미 존재하는 클래스를 html element에 적용하거나 해제        그러면 HTML을 바라보고 있던 CSS는 변경된 HTML에 새로운 값을 적용하게 됨  이것이 더 바람직한 방법! (더 적은 JS코드, 덜 헷갈림)  예제 1 : CSS와 JS를 분리해서 클릭 시 색깔 변경style.cssbody {    background-color: beige;}h1 {    color: blue;    transition:color .5s ease-in-out /*천천히 바뀜*/}.active {    color: tomato;}app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    const clickedClass = \"active\";     // \"active\"라는 raw value를 직접 if문의 비교에 사용하지 않고 변수에 담아서 사용    if(h1.className === clickedClass) {        h1.className = \"\";    } else {        h1.className = clickedClass;    }}h1.addEventListener(\"click\", handleTitleClick);  실수를 방지하기 위해 raw value(string)을 직접 사용하는 대신에 const 변수에 담아서 사용          raw value의 오타는 JavaScript가 알려주지 못함!      반면 변수의 오타는 체크해서 알려줌!        예제 1 문제점  기존에 이미 다른 클래스로 CSS 적용을 받고 있다면 JS로 클래스 변경 시 기존 클래스는 사라져 버리게 됨index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Momentum App&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;div class=\"hello\"&gt;        &lt;h1 class=\"sexy-font\"&gt;Click me!&lt;/h1&gt;    &lt;/div&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;style.cssbody {    background-color: beige;}h1 {    color: blue;    transition:color .5s ease-in-out}.active {    color: tomato;}.sexy-font {    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,     Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;}  h1 태그는 이미 sexy-font 클래스로 CSS 적용을 받고 있었음app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    const clickedClass = \"active\";    if(h1.className === clickedClass) {        h1.className = \"\";    } else {        h1.className = clickedClass;    }}h1.addEventListener(\"click\", handleTitleClick);      class 이름이 clickedClass가 아닌 sexy-font이므로 else문으로 들어가서 class 이름을 clickedClass로 새로 적용함        sexy-font라는 클래스를 삭제하지 않고 clickedClass 적용하는 방법은?          className 대신 classList 사용!        classList  classList는 말그대로 class들의 목록으로 작업할 수 있도록 함          classList.contains(className)                  class들의 목록이 해당 클래스를 포함하고 있는지 확인                    classList.add(className)                  class들의 목록에 해당 클래스를 추가                    classList.remove(className)                  class들의 목록에서 해당 클래스 삭제                    app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {  const clickedClass = \"active\";  if(h1.classList.contains(clickedClass)) {      h1.classList.remove(clickedClass);  } else {      h1.classList.add(clickedClass);  }}h1.addEventListener(\"click\", handleTitleClick);  classList.toggle()  이 일련의 과정들은 classList.toggle()로 대체될 수 있음!          toggle은 classList에 인자로 받은 class가 있는지 확인                  만약 있다면 해당 클래스를 제거          없다면 해당 클래스를 추가                    위 과정을 간단히 하나의 함수로 만든 것!      app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    h1.classList.toggle(\"active\");}h1.addEventListener(\"click\", handleTitleClick);JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",
        "url": "/js-css"
    }

    "js-event": {
        "title": "JavaScript (4) - 이벤트",
            "author": "jinhyungrhee",
            "category": "",
            "content": "이벤트(Event)  복습 : console.dir()  element의 내부를 보는 메서드 (object로 표시한 element)          그 중 on으로 시작하는 것은 event와 관련된 것임!        object 내부에 있는 일부 property의 값들은 변경할 수 있음 (불가능한 것도 존재)  object로 표현된 h1의 내부를 보다보면 style이 있고 그 안에 color property가 있음!  따라서 h1의 style을 JavaScript에서도 변경할 수 있음!!app.jsconst title = document.querySelector(\".hello:first-child h1\");console.dir(title);title.style.color = \"blue\";  event란?  클릭, 마우스 이동, 입력, 접속 해제 등 외부로부터 특정 값이 변경되는 것app.jsconst title = document.querySelector(\".hello:first-child h1\");// 어떤 event를 listen하고 싶은지 명시!title.addEventListener(\"click\");// JS는 title을 계속 지켜보다가 누군가 title을 click하는 것을 listen함  JavaScript에서 EventListener 등록app.jsconst title = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    console.log(\"title was clicked!\");}// handler함수를 listener의 두번째 인자로 전달// event가 발생하면 해당 handler함수를 호출title.addEventListener(\"click\", handleTitleClick);   EventHandler 함수도 등록  예제 1 : 클릭 시 텍스트 색깔 변경app.jsconst title = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    title.style.color = \"blue\";}title.addEventListener(\"click\", handleTitleClick);  listen하고 싶은 event를 찾는 법!          MDN Web Docs                  HTMLHeadingElement - Web APIs | MDN                    console.dir(element);                  property 이름 앞에 on이 붙으면 그게 바로 event listener임!                          onmouseenter : 마우스가 해당 element위에 올라갔을 때              onmouseleave : 마우스가 해당 element에서 떨어졌을 때                                            예제 2 : 마우스를 갖다 대거나 떼면 Text 변경app.jsconst title = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    title.style.color = \"blue\";}function handleMouseEnter() {    title.innerText = \"Mouse is HERE!\";}function handleMouseLeave() {    title.innerText = \"Mouse is GONE!\";}title.addEventListener(\"click\", handleTitleClick);title.addEventListener(\"mouseenter\", handleMouseEnter);title.addEventListener(\"mouseleave\", handleMouseLeave);  예제 3 : 복합적인 기능 추가      window 크기를 변경하면 body 색깔 변경    복사하면 “copier!” 경고    wifi 온라인/오프라인 경고  app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    h1.style.color = \"blue\";}function handleMouseEnter() {    h1.innerText = \"Mouse is HERE!\";}function handleMouseLeave() {    h1.innerText = \"Mouse is GONE!\";}function handleWindowResize() {    document.body.style.backgroundColor = \"tomato\";}function handleWindowCopy() {    alert(\"Copier!\");}h1.addEventListener(\"click\", handleTitleClick);h1.addEventListener(\"mouseenter\", handleMouseEnter);h1.addEventListener(\"mouseleave\", handleMouseLeave);window.addEventListener(\"resize\", handleWindowResize);window.addEventListener(\"copy\", handleWindowCopy);  window object도 JavaScript에서 기본적으로 제공함!  중요한 element인 body, head, title은 document를 이용하여 불러올 수 있음!          document.body / document.head / document.title ➡ O        나머지 element들은 querySelector나 getElementById등으로 찾아와야 함!          document.div ➡ X (undefined 리턴)        예제 4 : if-else문을 사용하여 text 색깔 변경app.jsconst h1 = document.querySelector(\".hello:first-child h1\");function handleTitleClick() {    const currentColor = h1.style.color; // 비교하는 기존 색상 저장하는 변수    let newColor; // 변하는 색상 저장하는 변수    if(currentColor === \"blue\") {        newColor = \"tomato\";    } else {        newColor = \"blue\";    }    h1.style.color = newColor; // update}h1.addEventListener(\"click\", handleTitleClick);  const, let 사용에 주의!  정리      JavaScript에서 대부분 하는 일은 Event를 listen하는 것!        Event를 사용하는 두 가지 방법          addEventListener()사용                  title.addEventListener(“click”, handleTitleClick);                    onEventName사용                  title.onclick = handleTitleCilck;                      ➡ addEventListener()가 더 유용!          removeEventListener()로 event listener 제거할 수 있음!      JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",
        "url": "/js-event"
    }

    "python-control-statement": {
        "title": "Python 강좌(2) - Python 제어문",
            "author": "jinhyungrhee",
            "category": "",
            "content": "Python 관련 포스트     Python (1) - Python 기본    Python (2) - Python 제어문이 글은 python의 제어문에 대한 내용을 담고 있습니다.# Jekyll configurationmarkdown: kramdown# kramdown : markdown의 개조판.# markdown에서 불편한 사항을 개선한 형태.# MyDataowner:  name:           Jinhyung Rhee  avatar:         photo.jpg  bio:            &quot;Ph.D. in Computer Science&quot;  email:          rheejinhyung@gmail.com  # Social networking links used in footer. Update and remove as you like.  twitter:  facebook:  github:  stackexchange:  linkedin:  instagram:  flickr:  tumblr:  # google plus id, include the &#39;+&#39;, eg +mmistakes  google_plus:highlighter: rouge# text highlighter로 rouge이용# 2016.02월 이후로 syntax highlighter는 rouge만 지원.# Pygments 사용불가.paginate: 20# 작성한 모든 post를 하나의 페이지에 열거할 수 없으니# pagination이 필요하고 몇개의 post를 하나의 page에서# 보여줄 건지를 설정.language: &#39;en-uk&#39;# 언어 설정url: https://jinhyungrhee.github.io# Google Search Console에서 사용하는 sitemap.xml 생성시# 이 url key값이 존재하지 않으면 sitemap.xml이# 정상적으로 생성되지 않는다.# 또한 disqus(댓글시스템)를 이용하기 위해서도 필요.# 자신의 github page url을 입력# ( https://your_github_id.github.io 형식 )baseurl: /# Website infotitle: Jinhyung&#39;s Blog# 자신의 blog title.description: Jinhyung&#39;s 기술 블로그# blog home에 표시될 blog에 대한 전반적인 설명.cover: assets/built/images/blog-cover1.png# blog home에 표시될 blog cover image.logo:logo_dark:favicon: assets/built/images/favicon.jpg# favicon으로 사용할 imageproduction_url: https://jinhyungrhee.github.io/# 최종적으로 blog가 운영될 urlsource_url:# blogmaker(jekyll source folder)에 대한 github repository# Social infonavigation: True# Navigation bar link를 보여줄건지 여부subscribers: True# subscriber 기능을 사용할건지의 여부# 저는 약간의 수정을 통해 subscriber 기능대신# lunr.js를 이용한 검색 기능으로 대체 사용했습니다.# 검색기능으로 대체하기 위해서# `_includes/subscribe-form.html` 파일의 수정이 필요합니다.twitter:facebook:# 만약 twitter와 facebook을 이용하면 username을 입력# Disqusdisqus: Truedisqus_shortname: xxxxxxxx# disqus는 온라인 댓글 시스템. 댓글 기능을 사용하기 위해# disqus를 이용할 것인지 여부와 만약 사용하면# disqus shortname을 입력 ( disqus username이 아님 )# Google Analyticsgoogle_analytics: UA-xxxxxxxx-x # replace with your GA tracking identifier# Google Analytics을 사용할 경우 GA tracking identifier를 입력# Permalinkspermalink: /:title# permalink: /author/:author# permalink: /tag/:title# 각각의 post에 고정주소를 어떤 방식으로 할당할 것인지를 결정# 이 값을 바꾸면 작성한 포스트의 저장위치나 파일이름이 변경된다.# gems and other configsplugins: [jekyll-paginate, jekyll-feed, jekyll-gist]feed:  path: feed.xml# Travis-CI 설정입니다. (배포와 빌드 자동화)safe: Falselsi: Falseusername: moon9342repo: GitHubPageMaker# username : travis-ci와 연동하는 github의 username# repo: travis-ci와 연동하는 github의 repository이름# https://github.com/&lt;username&gt;/&lt;repository&gt;branch: master# 사용할 branch명relative_source:destination: ../[GitHubPage]/# compile된 결과가 생성되는 폴더# 이 폴더안의 내용이 우리가 운영하는 블로그 내용이 컴파일되서 들어간다.# 이 폴더안의 내용을 github repository(https://username.github.io)에 push# 만약 Travis-CI를 이용할 예정이면 이 부분을 git submodule로# github repository(https://username.github.io)에 연결해야 한다.# exclude는 Jekyll컴파일 시 destination에 포함될 필요가# 없는것들을 명시한다. (node_modules와 필요없는 것들은 제외)exclude:  - README.md  - Rakefile  - Gemfile  - Gemfile.lock  - changelog.md  - &quot;*.Rmd&quot;  - vendor  - .travis.yml  - node_modules  - assets/css  - assets/images  - _posts/angular  - _posts/et-cetera  #  - _posts/python  - _posts/typescript  #  - _posts/jekyll  - _posts/iot  - _posts/r  - _posts/economy",
        "url": "/python-control-statement"

    "js-document": {
        "title": "JavaScript (3) - 문서 객체",
            "author": "jinhyungrhee",
            "category": "",
            "content": "문서 객체(document object)  브라우저에 이미 존재하는 object  우리가 접근할 수 있는 HTML을 가리키는 객체          document가 HTML을 JavaScript의 관점(object 형태)으로 보여줌        HTML 가져오기(document)      JavaScript에서 HTML document 객체로부터 title을 가지고 올 수 있음!    document.title&gt;&gt; \"Momentum\"        ➡ 브라우저가 HTML 정보가 아주 많이 들어있는 document라는 object를 전달해주는 것!    JavaScript에서 HTML을 읽어오는 것 뿐만 아니라 HTML을 변경할 수도 있음      document.title = \"HI\"  &gt;&gt; \"HI\"        중요한 것은 이 모든 설정들이 다 준비되어 있다는 것임!          HTML과 JavaScript를 연결하기 위해서 아무것도 하지 않아도 됨      브라우저가 사용자에게 많은 유용한 것들이 들어있는 document 객체를 주기 때문!        JavaScript vs HTML : 동시에 적용하면 누가 이길까?app.jsdocument.title = \"Hello! From JS!\";index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Hello! From HTML!&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;  결과          JS document win!        HTML 변경하기1(getElementById)      document.getElementById(); 사용    Id를 사용하여 JavaScript를 이용해 HTML element에 접근  element를 찾고나면 그 HTML에서 뭐든지 바꿀 수 있음          ex) innerText, className, autofocus …      index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Hello! From HTML!&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;h1 id=\"title\"&gt;Grab me!&lt;/h1&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;F12 consoledocument.getElementById(\"title\")&gt;&gt; &lt;h1 id=\"title\"&gt;Grab me!&lt;/h1&gt;  id=”title”을 가진 &lt;h1&gt;태그 가져옴app.js//console.dir(title)const title = document.getElementById(\"title\")console.dir(title)  console.dir() : element의 내부를 보는 메서드 (object로 표시한 element)          object 내부에 있는 일부 property의 값들은 변경할 수 있음! (불가능한 것도 존재)        &lt;h1&gt;title 하나에서 가져올 수 있는 모든 것을 보여줌app.jsconst title = document.getElementById(\"title\")title.innerText = \"Got you!\";  JavaScript로 &lt;h1&gt;태그 안의 값을 바꿔줄 수도 있음!app.jsconst title = document.getElementById(\"title\")title.innerText = \"Got you!\";console.log(title.id);console.log(title.className);  class 이름 확인하는 것도 가능!  HTML 변경하기2(getElementsByClassName)      document.getElementsByClassName() 사용        여러 개의 elements를 한번에 가져와야 하는 경우  index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Momentum App&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;h1 class=\"hello\"&gt;Grab me!&lt;/h1&gt;    &lt;h1 class=\"hello\"&gt;Grab me!&lt;/h1&gt;    &lt;h1 class=\"hello\"&gt;Grab me!&lt;/h1&gt;    &lt;h1 class=\"hello\"&gt;Grab me!&lt;/h1&gt;    &lt;h1 class=\"hello\"&gt;Grab me!&lt;/h1&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;F12 consoleconst hellos = document.getElementsByClassName(\"hello\");console.log(hellos)//값이 여러 개인 경우 배열에 담아서 리턴&gt;&gt; HTMLCollection(5) [h1.hello, h1.hello, h1.hello, h1.hello, h1.hello]  Element를 가져오는 가장 멋진 방법  document.querySelector()          첫 번째 값 하나만 리턴 (element)        document.querySelectorAll()          존재하는 모든 값 리턴 (array)      ➡ element를 CSS 방식으로 검색 가능index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Momentum App&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;div class=\"hello\"&gt;        &lt;h1&gt;Grab me!&lt;/h1&gt;    &lt;/div&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;F12 consoleconst title = document.querySelector(\".hello h1\");console.log(title)&gt;&gt; &lt;h1&gt;Grab me!&lt;/h1&gt;  document.querySelector는 한 개의 element만 리턴 (첫 번째 값)index.html&lt;!DOCTYPE html&gt;&lt;html lang=\"en\"&gt;&lt;head&gt;    &lt;meta charset=\"UTF-8\"&gt;    &lt;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"&gt;    &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;    &lt;link rel=\"stylesheet\" href=\"style.css\"&gt;    &lt;title&gt;Momentum App&lt;/title&gt;&lt;/head&gt;&lt;body&gt;    &lt;div class=\"hello\"&gt;        &lt;h1&gt;Grab me1!&lt;/h1&gt;    &lt;/div&gt;    &lt;div class=\"hello\"&gt;        &lt;h1&gt;Grab me2!&lt;/h1&gt;    &lt;/div&gt;    &lt;div class=\"hello\"&gt;        &lt;h1&gt;Grab me3!&lt;/h1&gt;    &lt;/div&gt;    &lt;script src=\"app.js\"&gt;&lt;/script&gt;     &lt;/body&gt;&lt;/html&gt;F12 consoleconst title = document.querySelectorAll(\".hello h1\");console.log(title)&gt;&gt; NodeList(3) [h1, h1, h1]  document.querySelectorAll는 모든 element 리턴 (array로 리턴)  정리  모든 것들은 document로부터 시작함!  즉 document는 website를 의미함          ex) document.title , document.body …      JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",
        "url": "/js-document"
    }
    ,
    
    "js-conditionals": {
        "title": "JavaScript (2) - 조건문",
            "author": "jinhyungrhee",
            "category": "",
            "content": "JavaScript 조건문  prompt()          사용자에게 창을 띄울 수 있게 해줌                  argument1 : message(string)          argument2 : default(string)                    아주 오래된 방법이라 잘 사용하지 않음      css 적용 안 됨          const age = prompt(\"How old are you?\"); // 입력 값이 들어올 때까지 잠시 멈춤(pause)  console.log(age);            type 확인하는 방법  typeof 키워드 사용          typeof 변수명          const age = prompt(\"How old are you?\");  console.log(typeof age);         type을 변경하는 방법  parseInt()          string을 number로 변환하는 함수      입력받은 숫자를 비교할 때 사용          parseInt(\"15\"); // 정수 15로 변환              입력 값이 숫자가 아닌 경우에 판별 가능                  일반적인 문자열을 parseInt()할 경우 NaN(Not a Number)리턴                          parseInt()는 “123”같은 string만 처리가능 → 123 리턴              “lalala”와 같은 string은 처리 불가 → NaN리턴                                              const age = parseInt(prompt(\"How old are you?\"));  console.log(age);        무언가가 NaN인지 판별하는 방법  isNaN()          true/false 리턴                  NaN이면, 즉 숫자가 아니면 true 리턴          NaN이 아니면, 즉 숫자면 false 리턴                        const age = parseInt(prompt(\"How old are you?\"));  console.log(isNaN(age));            조건문  조건(condition)은 boolean이어야 함if(condition) {    // condition === true} else {    // conditino === false}// 또는 (동일)if(condition) {    // condition === true}   예제const age = parseInt(prompt(\"How old are you?\"));if(isNaN(age)){    console.log(\"Please write a number\");} else {    console.log(\"Thank you for writing your age.\");}  다중조건const age = parseInt(prompt(\"How old are you?\"));if(isNaN(age)){    console.log(\"Please write a number.\");} else if(age &lt; 18) {    console.log(\"You are too young.\");} else {    console.log(\"You can dring.\");}  and 연산자(&amp;&amp;)          true &amp;&amp; true → true      true &amp;&amp; false → false      false &amp;&amp; true → false      false &amp;&amp; false → false        or 연산자(||)          true || true → true      true || false → true      false || true → true      false || false → false      const age = parseInt(prompt(\"How old are you?\"));if(isNaN(age) || age &lt; 0){    console.log(\"Please write a real positive number.\");} else if(age &lt; 18) {    console.log(\"You are too young.\");} else if(age &gt;= 18 &amp;&amp; age &lt;= 50) {    console.log(\" You can drink.\")} else if(age &gt; 50 &amp;&amp; age &lt;= 80) {    console.log(\"You should exercise.\");} else if(age &gt; 80) {    console.log(\"You can do whatever you want.\");}  equal 연산자(===)          ‘같다’ 의미      not equal 연산자는 !== : ‘다르다’ 의미      =는 대입 연산자          const age = parseInt(prompt(\"How old are you?\"));  // 실행 순서 고려하는 것 중요!  if(isNaN(age) || age &lt; 0){      console.log(\"Please write a real positive number.\");  } else if(age &lt; 18) {      console.log(\"You are too young.\");  } else if(age &gt;= 18 &amp;&amp; age &lt;= 50) {      console.log(\" You can drink.\")  } else if(age &gt; 50 &amp;&amp; age &lt;= 80) {      console.log(\"You should exercise.\");  }else if(age === 100) {      console.log(\"Wow you are wise\");  }else if(age &gt; 80) {      console.log(\"You can do whatever you want.\");  }         복잡한 조건문if((a &amp;&amp; b) || (c &amp;&amp; d) || (x || y)) {}  실행 순서 : 뒤에서 부터 true/false 리턴          (x || y) → true/false 리턴      (c &amp;&amp; d) → true/false 리턴      (a &amp;&amp; b) → true/false 리턴      JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",

        "title": "JavaScript (1) - 함수",
            "author": "jinhyungrhee",
            "category": "",
            "content": "JavaScript 함수 기초  function은 어떤 코드를 캡슐화해서 그걸 계속 반복해서 사용하도록 하는 것  Object 안에서 함수를 정의해서 사용할 수 있음!const player = {    name : \"nico\",    sayHello: function(otherPersonsName) {        console.log(\"hello \" + otherPersonsName + \" nice to meet you!\");    },};player.sayHello(\"lynn\");player.sayHello(\"dal\");player.sayHello(\"dean\");  calculator 예제const calculator = {    plus : function(a, b) {        console.log(a + b);    },    minus : function(a, b) {        console.log(a - b);    },    multiple : function(a, b) {        console.log(a * b);    },    divide : function(a, b) {        console.log(a / b);    }};calculator.plus(1, 3);calculator.minus(1, 3);calculator.multiple(1, 3);calculator.divide(1, 3);  console.log 대신 return 사용const calculator = {    plus : function(a, b) {        return a + b;    },    minus : function(a, b) {        return a - b;    },    multiple : function(a, b) {        return a * b;    },    divide : function(a, b) {        return a / b;    },    power : function(a, b) {        return a ** b;    }};//상호의존적으로 작용const plusResult = calculator.plus(2, 3);const minusResult = calculator.minus(plusResult, 10);const multipleResult = calculator.multiple(10, minusResult);const divideResult = calculator.divide(multipleResult, plusResult);const powerResult = calculator.power(divideResult, minusResult);console.log(powerResult);=&gt; return을 사용하면 상호의존적인 코드를 작성할 수 있음!  console.log는 단순히 값을 console에 출력하는 것          변수나 메모리에 저장되지 않음        return은 함수에서 처리된 결과값을 받아서 저장함          변수에 return 값을 저장하면 다른 곳에 이용하거나 상호의존적으로 사용가능        return을 하면 function은 작동을 멈추고 결과값을 return한 후 종료됨!          return 뒤에 코드를 작성하면 해당 코드는 작동하지 않음!      JavaScript 관련 포스트     JavaScript (1) - 함수    JavaScript (2) - 조건문    JavaScript (3) - 문서 객체    JavaScript (4) - 이벤트    JavaScript (5) - CSS 작업    JavaScript (6) - 사용자 입력",
